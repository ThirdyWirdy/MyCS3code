<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 50px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .summary-item {
            margin-bottom: 10px;
        }

        .summary-label {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Order Summary</h1>
        <div id="summaryContent"></div>
    </div>

    <script>
        function getCookie(name) {
            let cName = name + "=";
            let cookies = document.cookie.split(";");

            for (let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i];

                // remove leading space
                if (cookie.charAt(0) == " ") {
                    cookie = cookie.substring(1);
                }

                // match key
                if (cookie.indexOf(name) == 0) {
                    // return the substring of only the value of the cookie
                    return cookie.substring(cName.length);
                }
            }

            return null;
        }

        function displaySummary() {
            //retrieve stored order details
            let customerName = getCookie("customerName");
            let product = localStorage.getItem("product");
            let quantity = localStorage.getItem("quantity");
            let price;
            if (product == "stdSize") { //get price and product name based on product value
                product = "Standard Size Kit";
                price = 450;
            } else {
                product = "Large Size Kit";
                price = 750;
            }
            let total = price * parseInt(quantity);
            let pickupMethod = localStorage.getItem("pickupMethod");
            let address = localStorage.getItem("address");

            let content = "";
            // build summary content
            content += "<div class='summary-item'><span class='summary-label'>Customer Name:</span> " + customerName + "</div>";
            content += "<div class='summary-item'><span class='summary-label'>Product Name:</span> " + product + "</div>";
            content += "<div class='summary-item'><span class='summary-label'>Quantity:</span> " + quantity + "</div>";
            content += "<div class='summary-item'><span class='summary-label'>Total Amount:</span> ₱" + total + "</div>";
            content += "<div class='summary-item'><span class='summary-label'>Pickup Method:</span> " + pickupMethod + "</div>";

            if (pickupMethod === "Delivery") { //only show address if delivery is selected
                content += "<div class='summary-item'><span class='summary-label'>Address:</span> " + address + "</div>";
            }
            content += "<p>Thank you for your order!</p>";

            document.getElementById("summaryContent").innerHTML = content;
        }
        displaySummary();
    </script>
</body>

</html>
